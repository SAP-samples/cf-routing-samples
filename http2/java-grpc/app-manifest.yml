---
applications:
  - name: java-grpc-test
    disk_quota: 1G
    memory: 768M
    path: ./app/build/distributions/app.zip
    buildpacks:
      - java_buildpack
    routes:
      - route: java-grpc-test.((domain))
        protocol: http2
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 11.+ }}'
