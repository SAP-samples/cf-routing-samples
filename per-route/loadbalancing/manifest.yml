applications:
- name: per-route-loadbalancing-demo
  instances: 3
  buildpacks:
  - go_buildpack
  disk_quota: 512M
  memory: 64M
  routes:
  - route: per-route-lb.((domain))
  - route: per-route-lb-lc.((domain))
    options:
      loadbalancing: least-connection
  - route: per-route-lb-rr.((domain))
    options:
      loadbalancing: round-robin
  - route: per-route-lb-hb.((domain))
    options:
      loadbalancing: hash
      hash_header: http-header-name
      hash_balance: 1.2
